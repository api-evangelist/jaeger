apis:
  - aid: jaeger:jaeger-query-api
    name: Jaeger Query API
    description: >-
      The Jaeger Query API is an HTTP API exposed by the Jaeger Query service
      for retrieving distributed traces, listing services and operations,
      querying service dependency graphs, and accessing performance metrics
      including latency, call rates, and error rates.
    humanURL: https://www.jaegertracing.io/docs/latest/apis/
