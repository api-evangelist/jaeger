aid: jaeger
name: Jaeger
description: >-
  Jaeger is an open source, end-to-end distributed tracing system for
  monitoring and troubleshooting microservices-based architectures. Jaeger
  provides visibility into distributed system behavior through trace collection,
  storage, and visualization.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Distributed Tracing
  - Observability
  - Monitoring
  - Microservices
